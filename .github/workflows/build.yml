name: Java CI with Maven

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: |
        BRANCH=$(git branch --show-current)
        mvn clean package -Dproject.branch=$BRANCH

    - name: Get git hash and date
      id: vars
      run: |
        SHORT_HASH=$(git rev-parse --short HEAD)
        DATE=$(date +'%Y%m%d')
        echo "short_hash=$SHORT_HASH" >> $GITHUB_OUTPUT
        echo "date=$DATE" >> $GITHUB_OUTPUT
        echo "artifact_name=CoreProtect-${DATE}-${SHORT_HASH}" >> $GITHUB_OUTPUT

    - name: Rename fat-jar
      run: |
        mkdir -p artifact
        cp target/CoreProtect-*.jar "artifact/${{ steps.vars.outputs.artifact_name }}.jar"

    - name: Upload fat-jar
      uses: actions/upload-artifact@v7
      with:
        path: artifact/*.jar
        archive: false
